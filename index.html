<title>에이전트 허브 · 잠금</title>
<style>
  :root{--bg:#F5F7FA;--panel:#fff;--line:#E4E9F0;--ink:#141B26;--ink2:#56637A;--ink3:#8A97AC;--teal:#10B981;--danger:#EF4444;
    --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;display:grid;place-items:center;padding:20px;-webkit-font-smoothing:antialiased;}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 30px rgba(20,32,54,.09);padding:34px 30px;width:100%;max-width:380px;text-align:center;}
  .lock{width:52px;height:52px;border-radius:14px;background:#E6F7F0;color:var(--teal);display:grid;place-items:center;margin:0 auto 16px;}
  h1{font-size:19px;font-weight:800;letter-spacing:-.01em;}
  .sub{font-size:12.5px;color:var(--ink3);margin:6px 0 22px;line-height:1.5;}
  input{width:100%;font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  input:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:transparent;}
  button{width:100%;margin-top:11px;font-size:15px;font-weight:700;padding:13px;border:0;border-radius:11px;background:var(--teal);color:#fff;cursor:pointer;}
  button:hover{filter:brightness(1.05);} button:disabled{opacity:.6;cursor:default;}
  .err{color:var(--danger);font-size:12.5px;margin-top:12px;min-height:16px;}
  .note{font-size:11px;color:var(--ink3);margin-top:16px;line-height:1.5;}
</style></head><body>

  <h1>에이전트 허브</h1>
  <div class="sub">회원 개인정보가 포함된 화면입니다.<br>비밀번호를 입력하세요.</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  if(!(window.crypto&&crypto.subtle)) throw new Error('insecure');
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw.normalize('NFC')),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.s),iterations:P.n,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.i)},key,b64(P.c));
  return new TextDecoder().decode(pt);
}
function render(html){
  const f=document.createElement('iframe');
  f.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;';
  f.srcdoc=html; document.body.style.margin='0';
  document.body.innerHTML=''; document.body.appendChild(f);
}
const err=document.getElementById('err'),go=document.getElementById('go');
async function unlock(pw,silent){
  try{ const html=await dec(pw); try{sessionStorage.setItem('bmk',pw);}catch(e){} render(html); }
  catch(ex){
    if(silent){try{sessionStorage.removeItem('bmk');}catch(e){} return;}
    go.disabled=false;go.textContent='열기';
    err.textContent = ex.message==='insecure'
      ? 'HTTPS 주소로 열어야 합니다(비밀번호 복호화는 보안 연결 필요).'
      : '비밀번호가 올바르지 않습니다.';
    console.error('unlock error:',ex);
  }
}
document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();err.textContent='';go.disabled=true;go.textContent='여는 중…';unlock(document.getElementById('pw').value,false);});
/* 같은 탭 새로고침 시 자동 잠금해제 (탭 닫으면 사라짐) */
(function(){try{const s=sessionStorage.getItem('bmk');if(s)unlock(s,true);}catch(e){}})();
